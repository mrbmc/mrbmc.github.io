<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta charset="utf-8">
  <meta http-equiv="Imagetoolbar" content="" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="format-detection" content="telephone=no">
  <meta name="google-site-verification" content="7vE2o5qgkgIapuGrmnfqWvnVvWEaroo3YFyr6K_wIk4" />
  <meta name="generator" content="eleventy">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <title>{%if title %}{{ title }} | {% endif %}{{site.title}}</title>
  <meta name="description" content="{%if description %}{{ description }}{%else%}{{site.description}}{%endif%}">
  <meta property="og:title" content="{{ title }} | {{site.title}}">
  <meta property="og:description" content="{%if description %}{{ description }}{%else%}{{site.description}}{%endif%}">
  <meta property="og:image" content="{{site.url}}{{thumbnail | getOptimizedImageSrc }}">
  <meta property="og:type" content="website">
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:title" content="{{ title }} | {{site.title}}">
  <meta property="twitter:description" content="{%if description %}{{ description }}{%else%}{{site.description}}{%endif%}">
  <meta property="twitter:image" content="{{site.url}}{{thumbnail | getOptimizedImageSrc}}">

  <link rel="preload" as="style" href="/css/screen.css">
  <link rel="stylesheet" type="text/css" media="print" href="/css/print.css" />
  <link rel="stylesheet" type="text/css" media="screen" href="/css/screen.css" />
{% if cssfile %}
  <link rel="stylesheet" type="text/css" media="screen" href="/{{cssfile}}" />
{% endif %}
</head>

<body class="{{ bodyclass }}">

{% include "_header.html" %}

<main id="main">

{{ content }}

</main>

{% unless hidefooter %}{% include "_footer.html" %}{% endunless %}

</body>
</html>

<script type="module" src="/js/base.bundle.js"></script>
{% if jsfile %}<script type="module" src="/{{jsfile}}"></script>{% endif %}
<script type="application/javascript">
document.addEventListener('DOMContentLoaded', (e)=> {
    Array
    .from(document.getElementsByClassName('blur-in'))
    .slice(0,2)
    .map(element => {
        element.classList.toggle('in',true);
    });
});
</script>
