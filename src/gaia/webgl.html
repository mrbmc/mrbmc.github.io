<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boids Simulation with WebGL</title>
    <style>
      body {
        margin: 0;
      }
        canvas {
            display: block;
            margin: 0 auto;
            background-color: #012;
        }
        .controls {
            text-align: center;
            margin-top: 20px;
        }
        .slider {
            width: 300px;
        }
    </style>
</head>
<body>
    <canvas id="glcanvas" width="1280" height="720"></canvas>
    <div class="controls">
        <div>
            <label for="separation">Separation Weight: <span id="separationValue">0.01</span></label>
            <input type="range" id="separation" class="slider" min="0" max="0.1" step="0.001" value="0.01">
        </div>
        <div>
            <label for="alignment">Alignment Weight: <span id="alignmentValue">0.01</span></label>
            <input type="range" id="alignment" class="slider" min="0" max="0.1" step="0.001" value="0.01">
        </div>
        <div>
            <label for="cohesion">Cohesion Weight: <span id="cohesionValue">0.01</span></label>
            <input type="range" id="cohesion" class="slider" min="0" max="0.1" step="0.001" value="0.01">
        </div>
        <div>
            <label for="distance">Max Distance: <span id="distanceValue">0.1</span></label>
            <input type="range" id="distance" class="slider" min="0.01" max="1" step="0.01" value="0.1">
        </div>
        <div>
            <label for="distance">Max velocity: <span id="velocityValue">0.5</span></label>
            <input type="range" id="velocity" class="slider" min="0" max="1" step=".02" value="0.5">
        </div>
    </div>
    <script src="/js/webgl.min.js"></script>
</body>
</html>
