<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boids Simulation with WebGL</title>
    <link rel="stylesheet" type="text/css" media="screen" href="/css/gaia.css" />
</head>
<body>
    <canvas id="glcanvas" width="640" height="360"></canvas>
    <textarea id="debugger"></textarea>
<!-- 
    static visualRange = 0.1; // default 75, really controls how quickly boids coalesce
    static avoidFactor = 0.01; // Adjust velocity by this %; default 0.05
    static matchingFactor = 50; // Adjust by this % of average velocity; default 50
    static centeringFactor = 0.3; // How strong the clusters are, default 5
 -->
    <div id="controls">
        <div>
            <label for="range">Visual Range: <span id="rangeValue"></span></label>
            <input type="range" id="range" class="slider" min="0" max="1" step="0.05" value="0.10">
        </div>
        <div>
            <label for="separation">Separation: <span id="separationValue"></span></label>
            <input type="range" id="separation" class="slider" min="0" max="1" step="0.05" value="0.50">
        </div>
        <div>
            <label for="alignment">Alignment: <span id="alignmentValue"></span></label>
            <input type="range" id="alignment" class="slider" min="0" max="1" step=".05" value="0.50">
        </div>
        <div>
            <label for="cohesion">Cohesion: <span id="cohesionValue"></span></label>
            <input type="range" id="cohesion" class="slider" min="0.0" max="1" step="0.05" value="0.3">
        </div>
        <div>
            <button id="reset">Reset Simulation</button>
        </div>
        <!-- <div>
            <label for="distance">Max velocity: <span id="velocityValue">0.5</span></label>
            <input type="range" id="velocity" class="slider" min="0" max="1" step=".02" value="0.5">
        </div> -->
    </div>
    <script src="/js/boidsgl.min.js"></script>
</body>
</html>
