<script type="text/x-handlebars-template" id="project-list-template" class="template">
{{#each this}}
{{#unless private}}
<div id="{{slug}}" class="project" data-skills="{{#each skills}}{{this}} {{/each}}" data-project="{{slug}}" data-title="{{title}}">
	<div class="teaser">
		<a href="#{{slug}}">
		{{#if image }}
			<img src="{{image}}" alt="" border="0" />
		{{else}}
			<img src="{{slides.0.image}}" alt="" border="0" />
		{{/if}}
		</a>
	</div>
	<div class="caption">
		<h3><a href="#{{slug}}">{{title}}</a></h3>
		<h5 class="role">{{role}} &nbsp;</h5>
	</div>
</div>
{{/unless}}
{{/each}}
</script>
<script type="text/x-handlebars-template" id="project-detail-template" class="template">
<div class="teaser" style="background-image:url('{{image}}');">
	<div class="container">
		<h2>{{title}}</h2>
		<p class="link"><a href="{{url}}">{{url}}</a></p>
	</div>
</div>
<div class="container">
	<div class="row-fluid description">
		<div class="span12">

			{{#if description}}
				<p>{{nl2br description}}</p>
			{{else}}
				<br />
			{{/if}}

			<h5 class="role">Role:</h5><em>{{role}}</em> &nbsp;
		</div>
	</div>

	{{#each story}}
	<div class="row-fluid sample">
		<div class="span12">
			{{#if title}}<h3 class="">{{title}}</h3>{{/if}}
			{{#if image}}<div class="description">
				{{#if description}}<p>{{nl2br description}}</p>{{/if}}
			</div>{{/if}}
			{{#if image}}<a href="{{image}}"><img src="{{image}}" alt="" border="0" /></a>{{else}}
				{{#if description}}<p>{{nl2br description}}</p>{{/if}}
			{{/if}}
		</div>
	</div>
	{{/each}}
	<a href="#{{slug}}" class="close">Close</a>
</div>
</script> <!--/project-detail-template-->
