var flickr = {
    key: "41392a7d72d8ac7bd82ae6b2006dc61a",
    secret: "57bd6c9b8bd55ad6",
    getURL: function (page,perpage) {
        var uri = "https://api.flickr.com/services/rest/?";
            uri+= "&api_key=" + this.key;
            // uri+= "&method=flickr.photos.search";
            uri+= "&method=flickr.people.getPhotos";
            uri+= "&user_id=53646203@N08";
            uri+= "&format=json&nojsoncallback=1";
            // uri+= "&content_type=1";
            uri+= "&page="+page;
            uri+= "&per_page="+perpage;
            uri+= "&sort=interestingness-desc";
            // uri+= "&license=4,5,6,7,8";
            uri+= "&extras=date_taken,geo,tags,url_t,url_o,url_h";
            // uri+= "&tags="+tags;
        return uri;
    },
    loadImages: function(callback,page,perpage) {
        var page = (page) ? page : 0,
            perpage = (perpage) ? perpage : 20;
        $.getJSON(this.getURL(page,perpage), function(data){
            var item,src;
            for(var i=0,max=data.photos.photo.length;i<max;i++) {
                item = data.photos.photo[i];
            }
            callback(data.photos.photo);
        });
    }
}

$(document).ready(function(){

	//Setup the templates
	Handlebars.registerHelper('nl2br', function(text) {
		var nl2br = (text + '').replace(/([^>\r\n]?)(\r\n|\n\r|\r|\n)/g, '$1' + '<br /><br />' + '$2');
		return new Handlebars.SafeString(nl2br);
	});
	var list_source   	= $("#project-list-template").html();
	var list_template 	= Handlebars.compile(list_source);

    $pdata = [];
	// Open a project
	$gotoProject = function (project) {
		// console.log('gotoProject',project);
		var index,increment,current,data;

        $('#photo-detail').toggleClass('in',false);

		if(typeof project === "number") {
			index = parseInt(project);
		} else if (project == "+") {
			index = parseInt($('#photo-detail').data('index'))+1;
		} else if (project == "-") {
			index = parseInt($('#photo-detail').data('index'))-1;
		}

		data = $pdata[index];
        var image = data['url_h'] || data['url_o'];
        // $('#photo-detail img').attr('src',image);
		$('#photo-detail').css('background-image',"url('" + image + "')");
        $('#photo-detail .caption').text(data['title']);
		$('#photo-detail').toggleClass('in',false);
		$('#photo-detail').data('index',index);
		$('#gallery-paging').toggle(true);
		$('.thumbnail').removeClass('active');
		$('[data-index="' + index +'"]').toggleClass('active');
		window.location.hash = data['id'];
		return true;
	}
	//Close the project
	$closeProject = function () {
		$('.project').removeClass('active');//.removeClass('span12').addClass('span8 offset2');
		$('#portfolio-nav').toggleClass("hide", true);
		$('#gallery-paging').toggle(false);
		// $('.project.span8').show();
		window.location.hash = "";
		setTimeout(function () {
			$('.project.span8').show();
			// console.log('parent',$portfolioFilter);
		}, 500);
	}
	//Event Handlers
	$('.portfolio').delegate('.close','click',function (e) {
		e.preventDefault();
		$closeProject();
	});
	//watch the Esc key
	$("body").keyup(function(e) {
		if(e.keyCode == 27) {
			e.preventDefault();
			$closeProject();
		}
	});
	$('.page-rev').on('click',function(e) {
		e.preventDefault();
		$gotoProject("-");
	});
	$('.page-fwd').on('click',function(e) {
		e.preventDefault();
		$gotoProject("+");
	});
    window.onkeyup = function(e) {
        var key = e.keyCode ? e.keyCode : e.which;
        switch (key) {
            case 27:
                document.getElementById('sharing').className = '';
                break;
            case 32:
                Player.play();
                break;
            case 37:
            	$gotoProject("-");
                break;
            case 39:
            	$gotoProject("+");
                break;
        }
    }

	flickr.loadImages(function(data){
		// console.log('data',data);
        // $('.wallpaper').css('background-image','url(' + data[0]['src'] + ')');
        // $('.caption','.wallpaper').text("\u00a9 " + data[0]['ownername'] + " on flickr");
	  	var h = list_template(data);//$('#project-list_template').tmpl($pdata);
		$('#gallery-index').html(h);
		$pdata = data;

		$('.thumbnail').on('touchend click',function (e) {
			e.preventDefault();
			$gotoProject($(this).data('index'));
		});


        if(window.location.hash) {
            for(var i=0;i<$pdata.length;i++) {
                if($pdata[i]['id'] == window.location.hash.substr(1)) {
                    $gotoProject(i);
                    break;
                }
            }
        } else {
    		$gotoProject(0);
        }

    },
    0,
    50);


	$('#photo-detail img').on('load',function(e){
		$('#photo-detail').toggleClass('in',true);
		// console.log('image loaded',e);
	});

	jQuery('.thumbnail').bind('pinchopen',function (e) {
		alert('pinch');
	});
	jQuery('#portfolio').bind('swiperight',function (e) {
		alert('prev item');
	});
	jQuery('#portfolio').bind('swipeleft',function (e) {
		alert('next item');
	});

});
</script>
