<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta http-equiv="Imagetoolbar" content="" />
  <meta name="format-detection" content="telephone=no">
  <meta name="google-site-verification" content="DQmdjO07WcpJ5bOxDYLGSBnPpovsUnGuSqIFdQaRjHA" />
  <title>Brian McConnell | {{ title }}</title>
  <meta name="description" content="{%if page-description %}{{ page-description }}{%else%}Brian McConnell is a design executive with a unique background in design, product, engineering and entrepreneurship. His mission as a leader is to create a competitive advantage through design.{%endif%}">
<style type="text/css">
:root {
  --black: hsl(238, 55%, 4%);
  --gray-100: hsl(238, 28%, 20%);
  --gray-500: hsl(238, 13%, 50%);
  --gray-900: hsl(238, 8%, 82%);
  --white: hsl(0, 0%, 100%);

  --brandColor: hsl(238, 70%, 39%);
  --brandComplement: hsl(340, 100%, 70%);
  --brandAccent: hsl(188, 100%, 40%);

  --brandColor80: hsla(238, 70%, 39%, 80%);
  --brandColor20: hsla(238, 70%, 39%, 20%);
  --brandComplement20: hsla(340, 100%, 70%, 20%);
  --brandAccent20: hsla(188, 100%, 40%, 20%);
}
@media (prefers-color-scheme: dark) {
  :root {
      --black: hsl(0, 0%, 100%);
      --gray-100: hsl(238, 8%, 82%);
      --gray-500: hsl(238, 13%, 50%);
      --gray-900: hsl(238, 28%, 20%);
      --white: hsl(238, 55%, 4%);
  }
}
html {
  font-family: "Helvetica Neue",Helvetica,sans-serif;
  font-size: clamp(120%,1.8vw,240%);
  background: var(--white);
}
body {
  color: var(--gray-100);
  margin: 0;
}
a,a:visited {
  color: var(--black);
  text-decoration: none;
}
h1,h3 {
  font-weight: 400;
  color: var(--black);
}
#header {
  width:  62vw;
  line-height: 2rem;
  margin: 0 auto;
  display: flex;
  justify-content: space-between;
}
#header nav a {
  margin-left: 1em;
}
#open-menu,#close-menu,a[href="/resume/"],a[href="/photos/"] {
  display: none;
}
#main {
  width: 100vw;
  padding: 0 19vw;
  box-sizing: border-box;
  margin: auto;
  height: calc(100vh - 2rem);
  display: flex;
  flex-direction: column;
  justify-content: center;


        background: radial-gradient(62% 62% at 100% 20%,     var(--brandComplement20) 0%, hsla(238, 100%, 0%, 0) 100%)
                    ,radial-gradient(62% 38% at 0% 80%,       var(--brandAccent20) 0%,     hsla(238, 100%, 0%, 0) 100%)
                    ,radial-gradient(62% 130% at 50% 0%,     var(--brandColor80) 0%,      hsla(238, 100%, 0%, 0) 100%)
                    ,radial-gradient(100% 100% at 50% 100%,  var(--brandColor20) 0%,      hsla(238, 100%, 0%, 0) 100%)
                    ,hsl(238, 28%, 20%);
        background-repeat: no-repeat;
        background-attachment: fixed;
        animation: gradient 12000ms ease-in-out infinite;
}

@keyframes gradient {
    0% {
        background-position: 0% 0%;
        background-size: 100% 100%;
    }
    20% {
        background-position: 50% 0%;
        background-size: 200% 100%;
    }
    40% {
        background-position: 100% 0%;
        background-size: 200% 100%;
    }
    60% {
        background-position: 0% 0%;
        background-size: 100% 200%;
    }
    80% {
        background-position: 0% 100%;
        background-size: 100% 200%;
    }
    100% {
        background-position: 0% 0%;
        background-size: 100% 100%;
    }
}

</style>
</head>

<body class="{{ bodyclass }}">

{% include "_header.html" %}

<main id="main">

{{ content }}

</main>


</body>
</html>
