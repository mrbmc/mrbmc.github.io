title: Disney+
summary: |

How might we introduce the world's best known entertainment brand directly to consumers?

I joined Disney to help launch their streaming platforms. While there I built their design teams for **Growth Design**, **UX Research**, **Sports Products** and **Enterprise Tools**. I'm also deeply passionate about Design People Ops, and led efforts on our hiring methods, our career development framework, and new designer on-boarding.

---

## Growth Design

[Case study available on request](mailto:b@brianmcconnell.me?subject=Disney Plus Case Study)


"Growth Design" encompassed the on-boarding, subscription and profile management surfaces of Disney+. I led a team of 8 designers and researchers – in close collaboration with peers in marketing & product – to design for 17 platforms, 8 payment methods, 40+ countries, and 1000+ product combinations.

The result: 110 Million subscribers in two years.


![Growth Design](https://www.brianmcconnell.me/img/portfolio/disney-growth.png)

