## Host Dashboard

By far the most common workflow we saw almost every host take in the dashboard was viewing the listen numbers for their content. Hosts wanted to see a quantifiable reward for their effort. We surfaced these metrics and created new summary metrics in the dashboard to amplify the ROI for them.

||![](/img/portfolio/btr-hosttools-dashboard.png)||

## Podcast Writing Tips

The metrics were a useful indicator for the podcast health but they didn't provide the qualitative guidance that hosts needed to improve those numbers. The competitive landscape of support for hosts focused mostly on technical guidance for sound quality and distribiution. There was no guidance on how to write a compellign script, structure the show intro, or write compelling titles that inspire the audience to listen.

We knew from our own metrics that the first 30 seconds of a podcast episode were the most critical for engaging your audience and getting them hooked. How might we help hosts make the most of that opportunity?

We built features, like *Signal Strength*, to help improve the podcast _content_ directly in the tools. We took some some light gamification inspired by other apps and guided hosts toward creating complete and compelling podcast tiles, descriptions and introdutions.

