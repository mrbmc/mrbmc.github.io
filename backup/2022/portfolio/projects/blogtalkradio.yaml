title: Blog Talk Radio
summary: |
A complete overhaul of the User Experience for creating & managing podcasts on BlogTalkRadio. Interviews and usability labs with users helped us identify pain points that we turned into opportunities.
---
## Key Results
- 25% increase in total paid subscriptions.
- 15% increase in monthly subscription revenue
- 100%+ increase in user activation (host created 3+ episodes).

## Podcast Studio

The Studio is the heart of the BTR experience and it's the UI that hosts interact with during the highest stress moments of creating a podcast. User interviews with our host customers revealed important workflow hints around key features; and a lot about the emotional state during a live prodcast.

##### Key UX research insights:
- Producing a live interview for radio or podcast is a performance scenario which requires focus and preparation.
- Discoverability is key in a high pressure operation
- Sound clips are used for pre-baked intro and outros.
- Multiple affordances for caller states help first-time hosts.
- Feedback about the show state.

<p>The art direction was inspired by high-end Audio & Video authoring applications. We wanted to convey a serious, professional grade application for our hosts to work with.</p>

